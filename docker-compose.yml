services:
  ros2:
    build: .
    image: r2_jazzy
    container_name: ros2_jazzy_node
    # We use host network mode INSIDE the docker VM so that it shares the same network 
    # namespace as the bridge, ensuring seamless DDS multicast discovery.
    network_mode: "host"
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
      - RUST_LOG=info
    volumes:
      - .:/root/workspace
    # Keep the container alive so we can exec into it and run talker/listener
    command: tail -f /dev/null

  zenoh-bridge:
    image: eclipse/zenoh-bridge-ros2dds:latest
    container_name: ros2_zenoh_bridge
    network_mode: "host"
    # Override entrypoint to avoid ash shell expanding the '.*' glob
    entrypoint: ["/zenoh-bridge-ros2dds"]
    # The bridge connects to the Linux machine's IP on port 7447
    # -a ".*" tells the bridge to allow/route ALL DDS topics and ignore discovery filters
    command: ["-m", "client", "-e", "tcp/${LINUX_IP}:7447", "-a", ".*"]
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
      - RUST_LOG=info
